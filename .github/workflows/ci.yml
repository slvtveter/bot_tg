name: CI

# Runs the test suite and lints the application code on every push to main and
# on every pull request targeting main. With branch protection enabled (this
# check required), broken code can't be merged into main — and since Render
# auto-deploys main, only tested code reaches production.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # config.py refuses to import without a Telegram token and at least one
      # LLM key. The test suite never makes real successful calls (LLM I/O is
      # mocked / failures are tolerated), so dummy values are enough to satisfy
      # the import-time validation.
      TELEGRAM_BOT_TOKEN: "ci-dummy-token"
      GROQ_API_KEY: "ci-dummy-key"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint application code (flake8)
        run: flake8 src/

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"
