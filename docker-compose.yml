services:
  bot:
    build: .
    container_name: python_telegram_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_PATH=/data/bot.db
    volumes:
      - bot_data:/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot_data:
